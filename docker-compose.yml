services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: rpi3-meteo-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  postgres:
    image: postgres:16-bookworm
    container_name: rpi3-meteo-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${RPI3_METEO_DB_NAME}
      POSTGRES_USER: ${RPI3_METEO_DB_USER}
      POSTGRES_PASSWORD: ${RPI3_METEO_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RPI3_METEO_DB_USER} -d ${RPI3_METEO_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: .
    container_name: rpi3-meteo-web
    depends_on:
      mosquitto:
        condition: service_started
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${RPI3_METEO_WEB_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
volumes:
  mosquitto_data:
  mosquitto_log:
  postgres_data:
