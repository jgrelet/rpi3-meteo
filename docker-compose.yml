services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: rpi3-meteo-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  web:
    build:
      context: .
    container_name: rpi3-meteo-web
    depends_on:
      - mosquitto
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_log:
  sqlite_data:
